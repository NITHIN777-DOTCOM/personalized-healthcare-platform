<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%" fill="none">
  <defs>
    <!-- Gradient for the heartbeat pulse crossbar connecting the blue and green bars -->
    <linearGradient id="crossbarGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#4F8CFF" />
      <stop offset="100%" stop-color="#4ADE80" />
    </linearGradient>
    
    <!-- Optional soft drop shadow for modern subtle depth -->
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="2.5" flood-color="#4F8CFF" flood-opacity="0.15" />
    </filter>
  </defs>

  <g filter="url(#softShadow)">
    <!-- Left vertical bar of "H" (representing Tech/Blue/Trust) -->
    <rect x="22" y="20" width="10" height="60" rx="5" fill="#4F8CFF" />

    <!-- Right vertical bar of "H" (representing Health/Green/Growth) -->
    <rect x="68" y="20" width="10" height="60" rx="5" fill="#4ADE80" />

    <!-- Heartbeat/pulse crossbar (representing Life/Sync/Syncing) -->
    <!-- Connects the left bar (x=31) to the right bar (x=69) -->
    <path d="M 31 50 H 38 L 42 66 L 48 24 L 54 76 L 58 39 L 62 50 H 69" 
          stroke="url(#crossbarGradient)" 
          stroke-width="8" 
          stroke-linecap="round" 
          stroke-linejoin="round" 
          fill="none" />
  </g>
</svg>
